<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Service Monitor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #0f1117; color: #e0e0e0; padding: 2rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #ffffff; }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        .card { background: #1a1d27; border-radius: 12px; padding: 1.25rem; border: 1px solid #2a2d3a; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .url { font-size: 0.85rem; color: #aaa; word-break: break-all; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .up { background: #1a3a2a; color: #4ade80; }
        .down { background: #3a1a1a; color: #f87171; }
        .stat { margin-top: 0.5rem; font-size: 0.85rem; color: #888; }
        .stat span { color: #e0e0e0; font-weight: bold; }
        .refresh { margin-top: 2rem; color: #555; font-size: 0.8rem; }
    </style>
    <meta http-equiv="refresh" content="30">
</head>
<body>
<h1>Service Monitor</h1>
<p class="subtitle">Her 30 saniyede bir kontrol edilir — Ilayda Öztürk</p>

<div class="grid">
    <div class="card" th:each="result : ${results}">
        <div class="card-header">
            <span class="url" th:text="${result.url}"></span>
            <span class="badge up" th:if="${result.up}">UP</span>
            <span class="badge down" th:unless="${result.up}">DOWN</span>
        </div>
        <div class="stat">Durum kodu: <span th:text="${result.statusCode}"></span></div>
        <div class="stat">Yanıt süresi: <span th:text="${result.responseTimeMs} + ' ms'"></span></div>
        <div class="stat">Son kontrol: <span th:text="${result.checkedAt}"></span></div>
    </div>
</div>

<p class="refresh">Sayfa 30 saniyede bir otomatik yenilenir.</p>
</body>
</html>
